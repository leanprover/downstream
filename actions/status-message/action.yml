name: "Post or update status message"
description: >-
  Posts a status comment on a PR, or updates the existing one in place,
  identified by an invisible marker. See doc/adaptation_prs.md.
inputs:
  token:
    description: "GitHub token with permission to comment on the PR."
    required: true
  pr:
    description: "Number of the PR (or issue) to post the status message on."
    required: true
  body:
    description: "The status message body (Markdown)."
    required: true
  marker:
    description: >-
      Magic string identifying this status message, embedded as an invisible
      HTML comment so it can be located and updated on later runs.
    required: false
    default: "adaptation-status"
  final:
    description: >-
      If true, omit the marker from the posted message so the next
      post-or-update starts a fresh message instead of overwriting this one.
    required: false
    default: "false"
  repository:
    description: >-
      The owner/repo to operate on. Defaults to the repository running the
      workflow.
    required: false
    default: ""
outputs:
  comment-id:
    description: "The ID of the created or updated comment."
runs:
  using: "node20"
  main: "dist/index.js"
